name: Atualizador de Loterias Diário

on:
  schedule:
    # Roda todos os dias às 23:30 (Horário de Brasília) - Ajuste conforme a necessidade
    - cron: '30 2 * * *'
  workflow_dispatch: # Permite rodar manualmente no GitHub

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Executar Scraper
      run: python scraper_loterias.py

    - name: Commit e Push das alterações
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add dados_loterias/*.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Atualização automática dos resultados" && git push)
